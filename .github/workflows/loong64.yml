name: loong64
on:
  push:
    branches:
      - loong64-*
    tags:
      - release-loong64-*
  pull_request:
    branches:
      - loong64-*

env:
  COREDNS_IMAGE: ${{ vars.COREDNS_IMAGE || 'kubernetesloong64/coredns-loong64' }}

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    outputs:
      DOCKER_TAG: ${{ steps.extract.outputs.DOCKER_TAG }}
    permissions:
      contents: read
    env:
      GOOS: linux
      GOARCH: loong64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract CoreDNS branch
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          echo "REF=$REF"
          PROJECT_COREDNS_VERSION=$(echo $REF | awk -F'loong64-' '{print $2}')
          echo "PROJECT_COREDNS_VERSION=$PROJECT_COREDNS_VERSION"
          COREDNS_BRANCH=$(echo $PROJECT_COREDNS_VERSION | sed 's/+.*//')
          echo "COREDNS_BRANCH=$COREDNS_BRANCH"
          echo "COREDNS_BRANCH=$COREDNS_BRANCH" >> ${GITHUB_ENV}
          DOCKER_TAG=$(echo $PROJECT_COREDNS_VERSION | sed 's/+/-/g')
          echo "DOCKER_TAG=$DOCKER_TAG"
          echo "DOCKER_TAG=$DOCKER_TAG" >> ${GITHUB_ENV}
          echo "DOCKER_TAG=$DOCKER_TAG" >> ${GITHUB_OUTPUT}
      - name: Clone CoreDNS
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: coredns/coredns
          ref: ${{ env.COREDNS_BRANCH }}
          path: coredns
      - name: ls
        run: ls -lah
      - name: Install build tools
        run: |
          apt update
          apt install -y git make golang file jq
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      #- name: Apply patches
      #  working-directory: coredns
      #  run: git apply ../*.patch
      - name: Build CoreDNS
        working-directory: coredns
        run: make
      - name: Print binary SHA-256 checksums
        working-directory: coredns
        run: |
          sha256sum coredns
      - name: Inspect binary file types
        working-directory: coredns
        run: |
          echo "=== coredns ==="
          file coredns
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coredns-loong64-binaries
          path: |
            coredns/coredns
      - name: Build Docker image
        working-directory: coredns
        env:
          DOCKER_BUILDKIT: 1
        run: |
          echo "=== Before Docker build ==="
          docker images
          echo "=== Starting Docker build ==="
          docker build \
            --platform=${{ env.GOARCH }} \
            -t ${{ env.COREDNS_IMAGE }}:$DOCKER_TAG-${{ env.GOARCH }} \
            --build-arg=DEBIAN_IMAGE=ghcr.io/loong64/debian:trixie-slim \
            --build-arg=BASE=ghcr.io/loong64/debian:trixie-slim \
            .
          echo "=== After build ==="
          docker images
          IMAGE_REF=$(docker images ${{ env.COREDNS_IMAGE }} --format "{{.Repository}}:{{.Tag}}")
          echo "=== Saving $IMAGE_REF ==="
          docker save -o coredns-loong64.tar $IMAGE_REF
          echo "=== Image tarball ==="
          ls -lha coredns-loong64.tar
          echo "=== Manifest ==="
          echo "--- repositories ---"
          tar -xOf coredns-loong64.tar repositories
          echo "--- manifest.json ---"
          tar -xOf coredns-loong64.tar manifest.json | jq
          echo "--- config ---"
          tar -xOf coredns-loong64.tar $(tar -xOf coredns-loong64.tar manifest.json | jq -r '.[0].Config') | jq
          echo "--- os, architecture ---"
          tar -xOf coredns-loong64.tar $(tar -xOf coredns-loong64.tar manifest.json | jq -r '.[0].Config') | jq '{os, architecture}'
      - name: Upload container images
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coredns-loong64-images
          path: |
            coredns/coredns-loong64.tar

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOCKER_TAG: ${{ needs.build.outputs.DOCKER_TAG }}
    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coredns-loong64-binaries
          path: loong64-artifacts
      - name: Download container images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coredns-loong64-images
          path: loong64-artifacts
      - name: List downloaded files
        run: find . -type f
      - name: Login to Docker
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Load and push Docker image
        run: |
          echo "=== Before load ==="
          docker images
          echo "=== Loading image ==="
          docker load -i loong64-artifacts/coredns-loong64.tar
          echo "=== After load ==="
          docker images
          IMAGE_REF=$(docker images ${{ env.COREDNS_IMAGE }} --format "{{.Repository}}:{{.Tag}}")
          echo "=== Pushing $IMAGE_REF ==="
          docker push $IMAGE_REF
          IMAGE_BASE=${{ env.COREDNS_IMAGE }}
          ALT_IMAGE=${IMAGE_BASE//-loong64/}
          ALT_IMAGE_REF=$ALT_IMAGE:${{ env.DOCKER_TAG }}
          echo "=== Tagging and pushing $ALT_IMAGE_REF ==="
          docker tag $IMAGE_REF $ALT_IMAGE_REF
          docker push $ALT_IMAGE_REF
          echo "=== Push complete ==="
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY_BASE64 }}" | base64 -d | gpg --batch --import > /dev/null
          echo "$(gpg --list-secret-keys --keyid-format LONG | grep -Eo '[A-F0-9]{40}' | head -1):6:" | gpg --import-ownertrust
      - name: Sign artifacts
        run: |
          find loong64-artifacts -type f | while read -r file; do
            gpg --detach-sign --armor "$file"
            echo "Signed: $file"
            gpg --verify "$file".asc "$file"
          done
      - name: Generate release body
        env:
          BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: |
          cat > release-body.md <<'BODYEOF'
          ## Artifacts

          | File                  | Download                                                       |
          |-----------------------|----------------------------------------------------------------|
          | `coredns`             | [coredns](${{ env.BASE_URL }}/coredns)                         |
          | `coredns-loong64.tar` | [coredns-loong64.tar](${{ env.BASE_URL }}/coredns-loong64.tar) |

          Each file has a corresponding `.asc` detached GPG signature.

          ## Docker image

          ```
          kubernetesloong64/coredns:${{ env.DOCKER_TAG }}
          kubernetesloong64/coredns-loong64:${{ env.DOCKER_TAG }}-loong64
          ```

          Download and load the image:

          ```shell
          curl -LO ${{ env.BASE_URL }}/coredns-loong64.tar
          docker load -i coredns-loong64.tar
          ```

          ## Verify signatures

          ```shell
          gpg --keyserver keys.openpgp.org --recv-keys FCF8724722CCBF9F51B1FBE376532BE7E3013105
          echo "FCF8724722CCBF9F51B1FBE376532BE7E3013105:6:" | gpg --import-ownertrust
          gpg --verify <file>.asc <file>
          ```
          BODYEOF
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          files: |
            loong64-artifacts/**
