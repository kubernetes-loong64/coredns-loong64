name: loong64
on:
  push:
    branches:
      - loong64/*
    tags:
      - release-loong64/*/*
  pull_request:
    branches:
      - loong64/*

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    permissions:
      contents: read
    env:
      GOOS: linux
      GOARCH: loong64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract CoreDNS branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          COREDNS_BRANCH=$(echo $REF | awk -F'/' '{print $2}')
          echo "COREDNS_BRANCH=$COREDNS_BRANCH"
          echo "COREDNS_BRANCH=$COREDNS_BRANCH" >> ${GITHUB_ENV}
      - name: Clone CoreDNS
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: coredns/coredns
          ref: ${{ env.COREDNS_BRANCH }}
          path: coredns
      - name: ls
        run: ls -lah
      - name: Install build tools
        run: |
          apt update
          apt install -y git make golang file jq
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      #- name: Apply patches
      #  working-directory: coredns
      #  run: git apply ../*.patch
      - name: Build CoreDNS
        working-directory: coredns
        run: make
      - name: Inspect binary file types
        working-directory: coredns
        run: |
          echo "=== coredns ==="
          file coredns
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coredns-loong64-binaries
          path: |
            coredns/coredns
      - name: Build Docker image
        working-directory: coredns
        env:
          DOCKER_BUILDKIT: 1
        run: |
          echo "=== Before Docker build ==="
          docker images
          echo "=== Starting Docker build ==="
          docker build \
            --platform=${{ env.GOARCH }} \
            -t registry.k8s.io/coredns/coredns:${{ env.GOARCH }}-${{ env.COREDNS_BRANCH }} \
            --build-arg=DEBIAN_IMAGE=ghcr.io/loong64/debian:trixie-slim \
            --build-arg=BASE=ghcr.io/loong64/debian:trixie-slim \
            .
          echo "=== After Docker build ==="
          docker images
          docker save -o coredns-loong64.tar $(docker images registry.k8s.io/coredns/coredns --format "{{.ID}}")
          ls -lha
          tar -xOf coredns-loong64.tar repositories || tar -xOf coredns-loong64.tar manifest.json | jq
